name: auto-sign-a

on:
  schedule:
    # =========================
    # 时间点填写位置（UTC，精确到分）
    # 规则：分钟 小时 日 月 星期
    # 例：每周一 01:30 UTC 触发： "30 1 * * 1"
    # 按需填写多个定时；超过 5 个请复制本文件为 b/c 再填
    # =========================
    - cron: "15 0 * * 1"     # 周一 08:15（北京时间）
    - cron: "30 8 * * 1"    # 周一 16:30（北京时间）
    - cron: "0 2 * * 2"     # 周二 10:00（北京时间）
    - cron: "0 11 * * 2"    # 周二 19:00（北京时间）
    

  workflow_dispatch:

concurrency:
  group: auto-sign
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TZ: Asia/Shanghai
      # odd=单周 even=双周 any=不区分
      WEEK_PARITY: "any"
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
      XMU_ROLLCALL_USERNAME: ${{ secrets.XMU_ROLLCALL_USERNAME }}
      XMU_ROLLCALL_PASSWORD: ${{ secrets.XMU_ROLLCALL_PASSWORD }}
      # 可选：显示名，如果你的代码用到了 ENV_NAME_VAR
      XMU_ROLLCALL_NAME: ${{ secrets.XMU_ROLLCALL_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup micromamba (conda)
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true

      - name: Install repo CLI (editable)
        shell: bash
        run: |
          set -euo pipefail
          micromamba run -n autosign python -V
          micromamba run -n autosign pip install -U pip
          micromamba run -n autosign pip install -e ./xmu-rollcall-cli

      - name: Run auto_sign.py (max 30 min)
        shell: bash
        run: |
          set -euo pipefail
          echo "Now (Shanghai): $(TZ=Asia/Shanghai date '+%F %T %Z')"

          # 单双周可选：按 ISO 周数（01-53）
          WEEK_NUM=$(TZ=Asia/Shanghai date +%V)
          MOD=$((10#$WEEK_NUM % 2))

          if [ "${WEEK_PARITY}" = "odd" ] && [ "${MOD}" -ne 1 ]; then
            echo "Even ISO week (${WEEK_NUM}); WEEK_PARITY=odd -> exit."
            exit 0
          fi
          if [ "${WEEK_PARITY}" = "even" ] && [ "${MOD}" -ne 0 ]; then
            echo "Odd ISO week (${WEEK_NUM}); WEEK_PARITY=even -> exit."
            exit 0
          fi

          # 30 分钟强制结束
          micromamba run -n autosign timeout 1800s python auto_sign.py